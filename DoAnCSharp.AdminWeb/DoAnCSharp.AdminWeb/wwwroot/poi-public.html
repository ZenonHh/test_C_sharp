<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>Thông Tin Quán Ăn - Vĩnh Khánh Tour</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #2c3e50;
            padding-bottom: 30px;
        }

        /* ===== LOADING & ERROR STATES ===== */
        .loading-container, .error-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            flex-direction: column;
            gap: 20px;
            padding: 20px;
        }

        .loading-container {
            display: flex;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
        }

        .error-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .error-title {
            font-size: 24px;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 10px;
        }

        .error-text {
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .retry-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .retry-btn:active {
            transform: scale(0.95);
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            max-width: 100%;
            margin: 10px auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== GALLERY SECTION ===== */
        .gallery-section {
            position: relative;
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }

        .gallery-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 15px;
            color: white;
            font-size: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .gallery-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .gallery-img.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .gallery-nav {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .gallery-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: background 0.3s;
        }

        .gallery-dot.active {
            background: white;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        .gallery-controls {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 9;
        }

        .gallery-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.3);
            border: none;
            color: white;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            transition: background 0.3s;
            backdrop-filter: blur(5px);
        }

        .gallery-btn:active {
            background: rgba(255,255,255,0.5);
        }

        /* ===== INFO SECTION ===== */
        .info-section {
            padding: 25px;
        }

        .poi-header {
            margin-bottom: 20px;
        }

        .poi-name {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .poi-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #7f8c8d;
            font-size: 14px;
        }

        .meta-icon {
            font-size: 18px;
            color: #667eea;
        }

        /* ===== DESCRIPTION ===== */
        .description-section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ecf0f1;
        }

        .description-title {
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .description-text {
            line-height: 1.6;
            color: #555;
            font-size: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* ===== AUDIO SECTION ===== */
        .audio-section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ecf0f1;
        }

        .audio-title {
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .language-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .lang-tab {
            flex: 1;
            min-width: 100px;
            padding: 10px 15px;
            border: 2px solid #ecf0f1;
            background: white;
            color: #7f8c8d;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            text-align: center;
        }

        .lang-tab.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .audio-player {
            width: 100%;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .play-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .play-btn.playing {
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(102, 126, 234, 0.6); }
        }

        .audio-info {
            flex: 1;
            min-width: 0;
        }

        .audio-label {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 4px;
        }

        .audio-progress {
            width: 100%;
            height: 4px;
            background: #ecf0f1;
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
        }

        .audio-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.1s linear;
        }

        /* ===== DOWNLOAD SECTION ===== */
        .download-section {
            margin-bottom: 25px;
        }

        .download-title {
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .download-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .download-btn {
            flex: 1;
            min-width: 140px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .ios-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .android-btn {
            background: #34a853;
            color: white;
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        .download-btn svg {
            width: 20px;
            height: 20px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .container {
                margin: 5px;
                border-radius: 15px;
            }

            .gallery-section {
                height: 250px;
            }

            .info-section {
                padding: 20px;
            }

            .poi-name {
                font-size: 24px;
            }

            .language-tabs {
                gap: 8px;
            }

            .lang-tab {
                min-width: 80px;
                padding: 8px 12px;
                font-size: 13px;
            }

            .download-buttons {
                gap: 10px;
            }

            .download-btn {
                min-width: 120px;
                padding: 12px;
            }
        }

        .no-audio {
            color: #7f8c8d;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- LOADING STATE -->
    <div id="loadingContainer" class="loading-container">
        <div class="loader"></div>
        <p style="color: white; font-size: 16px;">Đang tải thông tin quán...</p>
    </div>

    <!-- ERROR STATE -->
    <div id="errorContainer" class="error-container hidden">
        <div class="error-message">
            <div class="error-icon">❌</div>
            <div class="error-title">Không tìm thấy quán</div>
            <div class="error-text" id="errorText">Không thể tải thông tin quán. Vui lòng thử lại.</div>
            <button class="retry-btn" onclick="location.reload()">Thử lại</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="contentContainer" class="hidden">
        <div class="container">
            <!-- GALLERY -->
            <div class="gallery-section">
                <div class="gallery-placeholder" id="galleryPlaceholder">
                    🏪
                </div>
                <img id="galleryImg" class="gallery-img" alt="Ảnh quán" />
                <div class="gallery-controls">
                    <button class="gallery-btn" id="prevBtn" onclick="prevImage()">❮</button>
                    <button class="gallery-btn" id="nextBtn" onclick="nextImage()">❯</button>
                </div>
                <div class="gallery-nav" id="galleryNav"></div>
            </div>

            <!-- INFO SECTION -->
            <div class="info-section">
                <!-- POI NAME AND LOCATION -->
                <div class="poi-header">
                    <div class="poi-name" id="poiName">Tên quán</div>
                    <div class="poi-meta">
                        <div class="meta-item">
                            <span class="meta-icon">📍</span>
                            <span id="poiAddress">Địa chỉ</span>
                        </div>
                    </div>
                </div>

                <!-- DESCRIPTION -->
                <div class="description-section">
                    <div class="description-title">
                        <span>📝</span>
                        <span>Mô tả</span>
                    </div>
                    <div class="description-text" id="poiDescription">Không có mô tả</div>
                </div>

                <!-- AUDIO NARRATION -->
                <div class="audio-section" id="audioSection">
                    <div class="audio-title">
                        <span>🎧</span>
                        <span>Thuyết minh âm thanh</span>
                    </div>

                    <!-- LANGUAGE TABS -->
                    <div class="language-tabs" id="languageTabs">
                        <button class="lang-tab active" data-lang="vi" onclick="selectLanguage('vi')">
                            🇻🇳 Tiếng Việt
                        </button>
                        <button class="lang-tab" data-lang="en" onclick="selectLanguage('en')">
                            🇬🇧 English
                        </button>
                        <button class="lang-tab" data-lang="ja" onclick="selectLanguage('ja')">
                            🇯🇵 日本語
                        </button>
                    </div>

                    <!-- AUDIO PLAYER -->
                    <div class="audio-player" id="audioPlayer">
                        <button class="play-btn" id="playBtn" onclick="toggleAudio()">
                            ▶
                        </button>
                        <div class="audio-info">
                            <div class="audio-label" id="audioLabel">Nhấn để nghe</div>
                            <div class="audio-progress" onclick="seekAudio(event)">
                                <div class="audio-progress-bar" id="progressBar"></div>
                            </div>
                        </div>
                    </div>
                    <audio id="audioElement" style="display: none;"></audio>
                </div>

                <!-- DOWNLOAD SECTION -->
                <div class="download-section">
                    <div class="download-title">
                        <span>📲</span>
                        <span>Tải ứng dụng</span>
                    </div>
                    <div class="download-buttons">
                        <button class="download-btn ios-btn" onclick="downloadApp('ios')">
                            <span>🍎</span>
                            <span>iOS App</span>
                        </button>
                        <button class="download-btn android-btn" onclick="downloadApp('android')">
                            <span>🤖</span>
                            <span>Android App</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://172.20.10.2:5000';
        let currentPOI = null;
        let currentLanguage = 'vi';
        let audioElement = null;
        let currentImages = [];
        let currentImageIndex = 0;

        // Get URL parameters
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // Show error
        function showError(message) {
            document.getElementById('loadingContainer').classList.add('hidden');
            document.getElementById('contentContainer').classList.add('hidden');
            document.getElementById('errorContainer').classList.remove('hidden');
            document.getElementById('errorText').textContent = message;
        }

        // Load POI data
        async function loadPOI() {
            try {
                const poiId = getQueryParam('poiId');
                const errorParam = getQueryParam('error');

                if (errorParam === 'poi_not_found') {
                    const code = getQueryParam('code');
                    showError(`Quán ăn không tìm thấy (${code})`);
                    return;
                }

                if (!poiId) {
                    showError('Không có ID quán');
                    return;
                }

                // Fetch POI data
                const response = await fetch(`${API_BASE}/api/pois/${poiId}`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                currentPOI = await response.json();

                // Populate UI
                document.getElementById('poiName').textContent = currentPOI.name || 'Tên quán';
                document.getElementById('poiAddress').textContent = currentPOI.address || 'Không có địa chỉ';
                document.getElementById('poiDescription').textContent = currentPOI.description || 'Không có mô tả';

                // Load images
                loadImages();

                // Setup audio
                setupAudio();

                // Show content
                document.getElementById('loadingContainer').classList.add('hidden');
                document.getElementById('contentContainer').classList.remove('hidden');
            } catch (error) {
                console.error('Error loading POI:', error);
                showError('Không thể tải thông tin quán: ' + error.message);
            }
        }

        // Load images
        function loadImages() {
            currentImages = [];
            currentImageIndex = 0;

            // Add POI image if exists
            if (currentPOI.imageAsset) {
                currentImages.push({
                    url: currentPOI.imageAsset,
                    alt: currentPOI.name
                });
            }

            // Add default images for demo
            if (currentImages.length === 0) {
                currentImages.push({
                    url: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22%3E%3Crect fill=%22%23667eea%22 width=%22400%22 height=%22300%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2248%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22 fill=%22white%22%3E🏪%3C/text%3E%3C/svg%3E',
                    alt: 'Ảnh quán'
                });
            }

            updateGallery();
        }

        // Update gallery display
        function updateGallery() {
            const img = document.getElementById('galleryImg');
            const placeholder = document.getElementById('galleryPlaceholder');
            const nav = document.getElementById('galleryNav');

            if (currentImages.length > 0) {
                const currentImg = currentImages[currentImageIndex];
                img.src = currentImg.url;
                img.classList.add('active');
                placeholder.classList.add('hidden');
            } else {
                img.classList.remove('active');
                placeholder.classList.remove('hidden');
            }

            // Update nav dots
            nav.innerHTML = '';
            currentImages.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = 'gallery-dot' + (idx === currentImageIndex ? ' active' : '');
                dot.onclick = () => {
                    currentImageIndex = idx;
                    updateGallery();
                };
                nav.appendChild(dot);
            });

            // Show/hide nav buttons
            document.getElementById('prevBtn').style.display = currentImages.length > 1 ? 'flex' : 'none';
            document.getElementById('nextBtn').style.display = currentImages.length > 1 ? 'flex' : 'none';
        }

        // Gallery navigation
        function prevImage() {
            if (currentImages.length > 1) {
                currentImageIndex = (currentImageIndex - 1 + currentImages.length) % currentImages.length;
                updateGallery();
            }
        }

        function nextImage() {
            if (currentImages.length > 1) {
                currentImageIndex = (currentImageIndex + 1) % currentImages.length;
                updateGallery();
            }
        }

        // Setup audio
        function setupAudio() {
            audioElement = document.getElementById('audioElement');

            const audioSection = document.getElementById('audioSection');
            
            if (!currentPOI.audioUrl) {
                // Show message that audio will be available
                audioSection.innerHTML = `
                    <div class="audio-title">
                        <span>🎧</span>
                        <span>Thuyết minh âm thanh</span>
                    </div>
                    <div class="no-audio">
                        <div style="margin-bottom: 10px;">🎵 Audio sẽ sớm có sẵn</div>
                        <div style="font-size: 13px; color: #999;">Hiện tại không có tệp âm thanh cho quán này</div>
                    </div>
                `;
            } else {
                // Setup audio player with language selection
                audioElement.src = currentPOI.audioUrl;
                audioElement.addEventListener('timeupdate', updateProgress);
                audioElement.addEventListener('ended', () => {
                    document.getElementById('playBtn').textContent = '▶';
                    document.getElementById('playBtn').classList.remove('playing');
                });
            }
        }

        // Select language
        function selectLanguage(lang) {
            currentLanguage = lang;
            document.querySelectorAll('.lang-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            console.log('Selected language:', lang);
        }

        // Toggle audio playback
        function toggleAudio() {
            if (!audioElement || !audioElement.src) {
                alert('Tệp âm thanh không khả dụng');
                return;
            }

            const btn = document.getElementById('playBtn');
            
            if (audioElement.paused) {
                audioElement.play();
                btn.textContent = '⏸';
                btn.classList.add('playing');
            } else {
                audioElement.pause();
                btn.textContent = '▶';
                btn.classList.remove('playing');
            }
        }

        // Update audio progress
        function updateProgress() {
            if (audioElement.duration) {
                const percent = (audioElement.currentTime / audioElement.duration) * 100;
                document.getElementById('progressBar').style.width = percent + '%';
                
                const minutes = Math.floor(audioElement.currentTime / 60);
                const seconds = Math.floor(audioElement.currentTime % 60);
                const durationMinutes = Math.floor(audioElement.duration / 60);
                const durationSeconds = Math.floor(audioElement.duration % 60);
                
                document.getElementById('audioLabel').textContent = 
                    `${minutes}:${seconds.toString().padStart(2, '0')} / ${durationMinutes}:${durationSeconds.toString().padStart(2, '0')}`;
            }
        }

        // Seek audio
        function seekAudio(event) {
            if (!audioElement || !audioElement.duration) return;
            
            const rect = event.currentTarget.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            audioElement.currentTime = percent * audioElement.duration;
        }

        // Download app
        function downloadApp(platform) {
            const links = {
                ios: 'https://apps.apple.com',
                android: 'https://play.google.com'
            };
            
            if (links[platform]) {
                window.location.href = links[platform];
            }
        }

        // Initialize
        window.addEventListener('load', loadPOI);
    </script>
</body>
</html>
